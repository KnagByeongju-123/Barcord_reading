<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>바코드 스캐너</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans KR',sans-serif;background:#f0f2f5;color:#212121;overflow-x:hidden}

    /* 메인 */
    .main{min-height:100vh;padding:0 0 20px}
    .main-hdr{background:linear-gradient(135deg,#1a237e,#283593);color:#fff;padding:16px;text-align:center}
    .main-hdr h1{font-size:20px;font-weight:700}
    .main-hdr p{font-size:12px;opacity:.7;margin-top:4px}
    .scan-start{display:block;margin:20px auto;padding:16px 40px;background:linear-gradient(135deg,#00c853,#00e676);color:#000;border:none;border-radius:14px;font-size:18px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 16px rgba(0,200,83,.3)}
    .scan-start:active{transform:scale(.97)}
    .m-sec{margin:12px;background:#fff;border-radius:12px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
    .m-tit{font-size:15px;font-weight:700;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
    .m-tit button{padding:4px 10px;border:1px solid #ffcdd2;border-radius:6px;background:none;color:#c62828;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
    .m-empty{text-align:center;padding:20px;color:#aaa;font-size:13px}
    .m-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f5f5f5}
    .m-item:last-child{border:none}
    .m-num{width:26px;height:26px;border-radius:6px;background:#e3f2fd;color:#1565c0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
    .m-body{flex:1;min-width:0}
    .m-val{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .m-meta{font-size:10px;color:#999;margin-top:1px}
    .m-cp{width:28px;height:28px;border:none;border-radius:6px;background:#f5f5f5;color:#888;font-size:13px;cursor:pointer;flex-shrink:0}
    .m-exp{display:flex;gap:8px;margin:12px}
    .m-exp button{flex:1;padding:10px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
    .me-csv{background:#1b5e20;color:#fff}.me-txt{background:#f5f5f5;color:#555;border:1px solid #ddd}

    /* 스캔 화면 */
    .scan-scr{display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:#000;z-index:1000;flex-direction:column}
    .scan-scr.active{display:flex}
    .s-top{padding:8px 14px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.7);z-index:10}
    .s-top span{font-size:12px;color:rgba(255,255,255,.8)}
    .s-back{padding:6px 12px;border:none;border-radius:6px;background:rgba(255,255,255,.15);color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
    .s-cam{flex:1;position:relative;overflow:hidden}
    #reader{width:100%;height:100%}
    #reader video{object-fit:cover!important}
    /* html5-qrcode 기본 UI 숨기기 */
    #reader__scan_region{position:relative!important}
    #reader__scan_region img{display:none!important}
    #reader__dashboard{display:none!important}
    #reader__header_message{display:none!important}
    .s-hint{position:absolute;bottom:8px;left:0;width:100%;text-align:center;font-size:12px;color:rgba(255,255,255,.7);z-index:15;pointer-events:none;text-shadow:0 1px 4px rgba(0,0,0,.8)}
    .s-bot{padding:8px 14px;display:flex;justify-content:center;align-items:center;gap:10px;background:rgba(0,0,0,.7);z-index:10;flex-wrap:wrap}
    .s-btn{padding:6px 14px;border:1.5px solid rgba(255,255,255,.3);border-radius:8px;background:rgba(0,0,0,.3);color:#fff;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
    .s-btn.on{border-color:#00d4ff;color:#00d4ff}
    .s-zm{display:flex;align-items:center;gap:4px}
    .s-zm label{font-size:10px;color:rgba(255,255,255,.5)}
    .s-zm input{width:60px;accent-color:#00d4ff}
    .s-zm span{font-size:10px;color:rgba(255,255,255,.5);min-width:24px}

    /* 결과 오버레이 */
    .r-ov{display:none;position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.75);z-index:50;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
    .r-ov.show{display:flex}
    .r-card{background:rgba(30,30,60,.95);border-radius:14px;padding:20px 28px;max-width:380px;width:85%;text-align:center;border:1px solid rgba(0,212,255,.2)}
    .r-val{font-size:20px;font-weight:700;color:#00e676;word-break:break-all;line-height:1.3;margin:10px 0 4px}
    .r-fmt{font-size:11px;color:#00d4ff}.r-tm{font-size:10px;color:rgba(255,255,255,.4);margin-top:2px}
    .r-btns{display:flex;gap:8px;margin-top:14px;justify-content:center;flex-wrap:wrap}
    .r-btns button{padding:10px 18px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
    .rb-reg{background:#00e676;color:#000}
    .rb-back{background:rgba(255,255,255,.1);color:#fff;border:1.5px solid rgba(255,255,255,.3)}
    .rb-copy{background:rgba(0,212,255,.15);color:#00d4ff;border:1.5px solid rgba(0,212,255,.3)}

    .flash{position:fixed;top:0;left:0;width:100%;height:100%;background:#00e676;opacity:0;pointer-events:none;z-index:9999;transition:opacity .1s}.flash.on{opacity:.2}
    .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#fff;padding:8px 18px;border-radius:18px;font-size:12px;font-weight:600;z-index:99999;opacity:0;transition:opacity .3s;pointer-events:none}.toast.show{opacity:1}
  </style>
</head>
<body>

<!-- 메인 -->
<div class="main" id="mainScreen">
  <div class="main-hdr"><h1>📷 바코드 스캐너</h1><p>html5-qrcode 기반 · Code39/128/EAN/QR 지원</p></div>
  <button class="scan-start" onclick="openScan()">📷 스캔 등록</button>
  <div class="m-sec">
    <div class="m-tit"><span>📋 스캔 이력 (<span id="histCnt">0</span>건)</span><button onclick="clearHist()">전체삭제</button></div>
    <div id="histList"><div class="m-empty">스캔 이력이 없습니다</div></div>
  </div>
  <div class="m-exp">
    <button class="me-csv" onclick="expCSV()">📥 CSV 저장</button>
    <button class="me-txt" onclick="expTXT()">📄 TXT 저장</button>
  </div>
</div>

<!-- 스캔 화면 -->
<div class="scan-scr" id="scanScreen">
  <div class="s-top">
    <button class="s-back" onclick="closeScan()">← 닫기</button>
    <span id="scanStatus">카메라 준비중...</span>
  </div>
  <div class="s-cam" id="camArea">
    <div id="reader"></div>
    <div class="s-hint" id="sHint">바코드를 가이드 안에 맞추세요</div>
    <div class="r-ov" id="resultOv">
      <div class="r-card">
        <div style="font-size:11px;color:rgba(255,255,255,.5)">스캔 결과</div>
        <div class="r-val" id="rVal"></div>
        <div class="r-fmt" id="rFmt"></div>
        <div class="r-tm" id="rTm"></div>
        <div class="r-btns">
          <button class="rb-reg" onclick="registerCode()">✅ 등록</button>
          <button class="rb-back" onclick="resumeScan()">🔄 재스캔</button>
          <button class="rb-copy" onclick="copyCode()">📋 복사</button>
        </div>
      </div>
    </div>
  </div>
  <div class="s-bot">
    <button class="s-btn" id="btnTorch" onclick="toggleTorch()">🔦 조명</button>
    <div class="s-zm">
      <label>줌</label>
      <input type="range" id="zoomR" min="1" max="5" step="0.1" value="2" oninput="setZoom(this.value)">
      <span id="zoomV">2.0x</span>
    </div>
  </div>
</div>

<div class="flash" id="flash"></div>
<div class="toast" id="toast"></div>

<script>
let html5Qr=null;
let hist=JSON.parse(localStorage.getItem('BC_HIST')||'[]');
let pendingCode=null;
let torchOn=false;
let lastCode='',lastTime=0;
const DUP_DELAY=2000;

// ===== 메인 =====
function renderHist(){
  const c=document.getElementById('histList');
  document.getElementById('histCnt').textContent=hist.length;
  if(!hist.length){c.innerHTML='<div class="m-empty">스캔 이력이 없습니다</div>';return}
  c.innerHTML='';
  hist.slice(0,100).forEach((h,i)=>{
    const d=document.createElement('div');d.className='m-item';
    d.innerHTML=`<div class="m-num">${i+1}</div><div class="m-body"><div class="m-val">${esc(h.value)}</div><div class="m-meta">${h.format} · ${h.time}</div></div><button class="m-cp" onclick="cpVal('${esc(h.value)}')">📋</button>`;
    c.appendChild(d);
  });
}
function esc(s){return s.replace(/'/g,'&#39;').replace(/"/g,'&quot;').replace(/</g,'&lt;')}
function clearHist(){if(!hist.length)return;if(!confirm('전체 이력 삭제?'))return;hist.length=0;localStorage.setItem('BC_HIST','[]');renderHist()}
function cpVal(v){v=v.replace(/&#39;/g,"'").replace(/&quot;/g,'"').replace(/&lt;/g,'<');navigator.clipboard.writeText(v).then(()=>showToast('복사: '+v)).catch(()=>{const t=document.createElement('textarea');t.value=v;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);showToast('복사: '+v)})}
function expCSV(){if(!hist.length){showToast('이력 없음');return}let csv='\uFEFF번호,바코드,형식,시간\n';hist.forEach((h,i)=>{csv+=`${i+1},"${h.value}",${h.format},"${h.time}"\n`});dlF(csv,'바코드이력.csv','text/csv;charset=utf-8')}
function expTXT(){if(!hist.length){showToast('이력 없음');return}dlF(hist.map(h=>h.value).join('\n'),'바코드목록.txt','text/plain;charset=utf-8')}
function dlF(c,fn,tp){const b=new Blob([c],{type:tp}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=fn;a.click();URL.revokeObjectURL(a.href)}

// ===== 스캔 열기/닫기 =====
async function openScan(){
  document.getElementById('scanScreen').classList.add('active');
  document.body.style.overflow='hidden';
  await startScanner();
}

async function closeScan(){
  if(html5Qr){
    try{await html5Qr.stop()}catch(e){}
    try{html5Qr.clear()}catch(e){}
    html5Qr=null;
  }
  torchOn=false;
  document.getElementById('scanScreen').classList.remove('active');
  document.body.style.overflow='';
  renderHist();
}

async function startScanner(){
  document.getElementById('scanStatus').textContent='카메라 준비중...';

  const config={
    fps:10,
    qrbox:function(vw,vh){
      // 가로 직사각형 스캔 영역
      const w=Math.floor(Math.min(vw,vh)*0.85);
      const h=Math.floor(w*0.25);
      return{width:w,height:h};
    },
    aspectRatio:1.0,
    formatsToSupport:[
      Html5QrcodeSupportedFormats.CODE_39,
      Html5QrcodeSupportedFormats.CODE_128,
      Html5QrcodeSupportedFormats.CODE_93,
      Html5QrcodeSupportedFormats.EAN_13,
      Html5QrcodeSupportedFormats.EAN_8,
      Html5QrcodeSupportedFormats.UPC_A,
      Html5QrcodeSupportedFormats.UPC_E,
      Html5QrcodeSupportedFormats.ITF,
      Html5QrcodeSupportedFormats.CODABAR,
      Html5QrcodeSupportedFormats.QR_CODE,
      Html5QrcodeSupportedFormats.DATA_MATRIX,
      Html5QrcodeSupportedFormats.PDF_417,
    ],
    experimentalFeatures:{useBarCodeDetectorIfSupported:true},
    rememberLastUsedCamera:true,
    showTorchButtonIfSupported:false,
    showZoomSliderIfSupported:false,
    defaultZoomValueIfSupported:2,
    focusMode:'continuous',
    advanced:[{focusMode:'continuous'},{zoom:2}]
  };

  html5Qr=new Html5Qrcode('reader');

  try{
    await html5Qr.start(
      {facingMode:'environment'},
      config,
      onScanSuccess,
      onScanFailure
    );
    document.getElementById('scanStatus').textContent='스캔 대기중';

    // 줌 범위 설정
    try{
      const caps=html5Qr.getRunningTrackCapabilities();
      if(caps&&caps.zoom){
        const zr=document.getElementById('zoomR');
        zr.min=caps.zoom.min||1;
        zr.max=Math.min(caps.zoom.max||5,8);
        zr.value=Math.min(2,caps.zoom.max||2);
        document.getElementById('zoomV').textContent=parseFloat(zr.value).toFixed(1)+'x';
      }
    }catch(e){}

    // 초기 줌 2x 적용
    try{await html5Qr.applyVideoConstraints({advanced:[{zoom:2}]})}catch(e){}

  }catch(e){
    document.getElementById('scanStatus').textContent='카메라 오류: '+e;
    showToast('카메라 접근 실패');
  }
}

function onScanSuccess(decodedText,decodedResult){
  const now=Date.now();
  if(decodedText===lastCode&&now-lastTime<DUP_DELAY)return;
  lastCode=decodedText;lastTime=now;

  // 플래시+진동
  const fl=document.getElementById('flash');fl.classList.add('on');setTimeout(()=>fl.classList.remove('on'),150);
  if(navigator.vibrate)navigator.vibrate([50,30,50]);

  const ts=new Date().toLocaleString('ko-KR');
  const fmt=fmtName(decodedResult.result.format?decodedResult.result.format.formatName:'unknown');

  document.getElementById('rVal').textContent=decodedText;
  document.getElementById('rFmt').textContent='형식: '+fmt;
  document.getElementById('rTm').textContent=ts;
  pendingCode={value:decodedText,format:fmt,time:ts,ts:now};

  // 스캔 일시정지 → 결과 표시
  try{html5Qr.pause(true)}catch(e){}
  document.getElementById('resultOv').classList.add('show');
  document.getElementById('scanStatus').textContent='스캔 완료';
  document.getElementById('sHint').textContent='';
}

function onScanFailure(err){
  // 인식 실패는 무시 (계속 시도)
}

function registerCode(){
  if(!pendingCode){showToast('스캔된 바코드 없음');return}
  if(hist.find(h=>h.value===pendingCode.value&&h.ts===pendingCode.ts)){showToast('이미 등록됨');resumeScan();return}
  hist.unshift({...pendingCode});if(hist.length>200)hist.length=200;
  localStorage.setItem('BC_HIST',JSON.stringify(hist));
  showToast('✅ 등록: '+pendingCode.value);
  pendingCode=null;
  resumeScan();
}

function resumeScan(){
  document.getElementById('resultOv').classList.remove('show');
  document.getElementById('scanStatus').textContent='스캔 대기중';
  document.getElementById('sHint').textContent='바코드를 가이드 안에 맞추세요';
  try{html5Qr.resume()}catch(e){}
}

function copyCode(){
  const v=document.getElementById('rVal').textContent;if(!v)return;
  navigator.clipboard.writeText(v).then(()=>showToast('복사됨')).catch(()=>{
    const t=document.createElement('textarea');t.value=v;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);showToast('복사됨');
  });
}

function fmtName(f){
  if(!f)return'?';
  const s=f.toString().toUpperCase();
  const map={'QR_CODE':'QR','CODE_39':'Code39','CODE_128':'Code128','CODE_93':'Code93','EAN_13':'EAN-13','EAN_8':'EAN-8','UPC_A':'UPC-A','UPC_E':'UPC-E','ITF':'ITF','CODABAR':'Codabar','DATA_MATRIX':'DataMatrix','PDF_417':'PDF417','AZTEC':'Aztec'};
  return map[s]||s;
}

// ===== 카메라 제어 =====
async function toggleTorch(){
  if(!html5Qr)return;
  try{
    const caps=html5Qr.getRunningTrackCapabilities();
    if(!caps||!caps.torch){showToast('조명 미지원');return}
    torchOn=!torchOn;
    await html5Qr.applyVideoConstraints({advanced:[{torch:torchOn}]});
    document.getElementById('btnTorch').classList.toggle('on',torchOn);
  }catch(e){showToast('조명 제어 실패')}
}

async function setZoom(v){
  if(!html5Qr)return;
  v=parseFloat(v);
  try{await html5Qr.applyVideoConstraints({advanced:[{zoom:v}]})}catch(e){}
  document.getElementById('zoomV').textContent=v.toFixed(1)+'x';
}

// ===== UI =====
let tt;
function showToast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('show'),2000)}

renderHist();
</script>
</body>
</html>
