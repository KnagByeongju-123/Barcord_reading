<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>바코드 스캐너</title>
  <script src="https://cdn.jsdelivr.net/npm/@nicebartm/quagga2@1.0.0/dist/quagga.min.js" onerror=""></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0a0a0a;--card:#1a1a2e;--accent:#00d4ff;--ok:#00e676;--ng:#ff5252;--text:#e0e0e0;--text2:#888}
    body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
    .hdr{padding:10px 16px;display:flex;align-items:center;justify-content:space-between;background:rgba(26,26,46,.95);position:sticky;top:0;z-index:50}
    .hdr h1{font-size:16px;font-weight:700;color:var(--accent)}
    .hdr .sc{font-size:12px;color:var(--text2)}
    /* 카메라 */
    .cam-wrap{position:relative;width:100%;max-width:500px;margin:0 auto;background:#000;height:280px;overflow:hidden}
    #video{width:100%;height:100%;object-fit:cover;display:block}
    .scan-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
    .scan-box{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:75%;height:40%;border:2px solid var(--accent);border-radius:10px}
    .scan-box::before{content:'';position:absolute;top:-1px;left:10%;right:10%;height:2px;background:var(--accent);box-shadow:0 0 10px var(--accent);animation:sl 2s ease-in-out infinite}
    @keyframes sl{0%,100%{top:-1px}50%{top:calc(100% - 1px)}}
    .sc-c{position:absolute;width:18px;height:18px;border-color:var(--accent);border-style:solid}
    .sc-tl{top:-2px;left:-2px;border-width:3px 0 0 3px;border-radius:6px 0 0 0}
    .sc-tr{top:-2px;right:-2px;border-width:3px 3px 0 0;border-radius:0 6px 0 0}
    .sc-bl{bottom:-2px;left:-2px;border-width:0 0 3px 3px;border-radius:0 0 0 6px}
    .sc-br{bottom:-2px;right:-2px;border-width:0 3px 3px 0;border-radius:0 0 6px 0}
    .scan-hint{position:absolute;bottom:8%;left:0;width:100%;text-align:center;font-size:12px;color:rgba(255,255,255,.7);text-shadow:0 1px 4px rgba(0,0,0,.8)}
    /* 탭 초점 영역 */
    .tap-focus{position:absolute;top:0;left:0;width:100%;height:100%;z-index:10;cursor:pointer}
    .focus-ring{position:absolute;width:60px;height:60px;border:2px solid var(--accent);border-radius:50%;transform:translate(-50%,-50%) scale(1.5);opacity:0;transition:transform .3s,opacity .3s;pointer-events:none}
    .focus-ring.show{transform:translate(-50%,-50%) scale(1);opacity:1}
    .focus-ring.done{transform:translate(-50%,-50%) scale(.8);opacity:0}
    /* 상태 */
    .status{padding:4px 16px;font-size:11px;text-align:center}
    .status.ok{color:var(--ok)}.status.err{color:var(--ng)}.status.warn{color:#ffc107}
    /* 컨트롤 */
    .ctrl{display:flex;gap:6px;padding:8px 12px;background:var(--card);align-items:center;justify-content:center;flex-wrap:wrap}
    .cb{padding:7px 12px;border:1.5px solid rgba(255,255,255,.15);border-radius:8px;background:rgba(255,255,255,.05);color:var(--text);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
    .cb:active{background:rgba(255,255,255,.15)}.cb.on{border-color:var(--accent);color:var(--accent);background:rgba(0,212,255,.1)}
    .zm{display:flex;align-items:center;gap:4px}
    .zm label{font-size:10px;color:var(--text2)}
    .zm input[type=range]{width:70px;accent-color:var(--accent)}
    .zm span{font-size:10px;color:var(--text2);min-width:26px}
    /* 결과 */
    .res-area{padding:10px 12px}
    .last-r{background:var(--card);border-radius:10px;padding:12px;margin-bottom:10px;border:1px solid rgba(255,255,255,.08);display:none}
    .lr-lb{font-size:10px;color:var(--text2);margin-bottom:4px}
    .lr-val{font-size:18px;font-weight:700;color:var(--ok);word-break:break-all;line-height:1.3}
    .lr-fmt{font-size:10px;color:var(--accent);margin-top:3px}
    .lr-tm{font-size:10px;color:var(--text2);margin-top:1px}
    .lr-acts{display:flex;gap:6px;margin-top:8px}
    .lr-acts button{flex:1;padding:7px;border:none;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
    .btn-cp{background:rgba(0,212,255,.15);color:var(--accent)}
    .btn-sr{background:rgba(124,77,255,.15);color:#7c4dff}
    /* 이력 */
    .hist{background:var(--card);border-radius:10px;padding:12px;border:1px solid rgba(255,255,255,.08)}
    .hist-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .hist-top h3{font-size:13px;font-weight:700}
    .hist-top button{padding:3px 8px;border:1px solid rgba(255,82,82,.3);border-radius:5px;background:none;color:var(--ng);font-size:10px;font-weight:600;cursor:pointer;font-family:inherit}
    .h-empty{text-align:center;padding:14px;color:var(--text2);font-size:12px}
    .h-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05)}
    .h-item:last-child{border:none}
    .h-num{width:22px;height:22px;border-radius:5px;background:rgba(0,212,255,.15);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
    .h-body{flex:1;min-width:0}
    .h-val{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .h-meta{font-size:9px;color:var(--text2);margin-top:1px}
    .h-cp{width:26px;height:26px;border:none;border-radius:5px;background:rgba(255,255,255,.05);color:var(--text2);font-size:12px;cursor:pointer;flex-shrink:0}
    .exp{padding:8px 12px;display:flex;gap:6px}
    .exp button{flex:1;padding:9px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
    .btn-csv{background:linear-gradient(135deg,#1b5e20,#2e7d32);color:#fff}
    .btn-txt{background:rgba(255,255,255,.08);color:var(--text);border:1px solid rgba(255,255,255,.15)}
    .flash{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--ok);opacity:0;pointer-events:none;z-index:999;transition:opacity .1s}.flash.on{opacity:.15}
    .toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#fff;padding:8px 18px;border-radius:18px;font-size:12px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}.toast.show{opacity:1}
  </style>
</head>
<body>
<div class="hdr"><h1>📷 바코드 스캐너</h1><span class="sc" id="scanCnt">스캔: 0건</span></div>

<div class="cam-wrap" id="camWrap">
  <video id="video" autoplay playsinline muted></video>
  <div class="tap-focus" id="tapArea"></div>
  <div class="focus-ring" id="focusRing"></div>
  <div class="scan-overlay">
    <div class="scan-box">
      <div class="sc-c sc-tl"></div><div class="sc-c sc-tr"></div><div class="sc-c sc-bl"></div><div class="sc-c sc-br"></div>
    </div>
    <div class="scan-hint">화면을 탭하면 초점을 맞춥니다</div>
  </div>
</div>

<div class="status" id="statusBar">카메라 준비중...</div>

<div class="ctrl">
  <button class="cb on" id="btnAF" onclick="toggleAF()">AF 초점</button>
  <button class="cb" id="btnTorch" onclick="toggleTorch()">🔦 조명</button>
  <button class="cb" id="btnCont" onclick="toggleCont()">연속스캔</button>
  <div class="zm">
    <label>줌</label>
    <input type="range" id="zoomR" min="1" max="5" step="0.1" value="2" oninput="setZoom(this.value)">
    <span id="zoomV">2.0x</span>
  </div>
</div>

<div class="res-area">
  <div class="last-r" id="lastR">
    <div class="lr-lb">스캔 결과</div>
    <div class="lr-val" id="lrVal"></div>
    <div class="lr-fmt" id="lrFmt"></div>
    <div class="lr-tm" id="lrTm"></div>
    <div class="lr-acts">
      <button style="flex:1.5;padding:10px;background:rgba(0,230,118,.2);color:var(--ok);border:1.5px solid rgba(0,230,118,.4);border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit" onclick="registerLast()">✅ 이력 등록</button>
      <button class="btn-cp" onclick="copyLast()">📋 복사</button>
      <button class="btn-sr" onclick="searchLast()">🔍 검색</button>
    </div>
  </div>
  <div class="hist">
    <div class="hist-top"><h3>스캔 이력</h3><button onclick="clearHist()">전체삭제</button></div>
    <div id="histList"><div class="h-empty">스캔 이력이 없습니다</div></div>
  </div>
</div>
<div class="exp">
  <button class="btn-csv" onclick="expCSV()">📥 CSV 저장</button>
  <button class="btn-txt" onclick="expTXT()">📄 TXT 저장</button>
</div>

<div class="flash" id="flash"></div>
<div class="toast" id="toast"></div>
<canvas id="scanCv" style="display:none"></canvas>

<script>
let video,stream,track,cv,ctx;
let scanning=false,cont=false,afOn=true,torchOn=false;
let hist=JSON.parse(localStorage.getItem('BC_HIST')||'[]');
let lastCode='',lastTime=0;
const DUP_DELAY=2000;
let detector=null;

// ===== 초기화 =====
async function init(){
  video=document.getElementById('video');
  cv=document.getElementById('scanCv');
  ctx=cv.getContext('2d',{willReadFrequently:true});

  // BarcodeDetector 확인
  if('BarcodeDetector' in window){
    try{
      const fmts=await BarcodeDetector.getSupportedFormats();
      detector=new BarcodeDetector({formats:fmts});
      setSt('BarcodeDetector 지원 ('+fmts.length+'개 형식)','ok');
    }catch(e){detector=null}
  }

  await startCam();
  renderHist();
  document.getElementById('scanCnt').textContent='스캔: '+hist.length+'건';

  // 탭 초점
  document.getElementById('tapArea').addEventListener('click',onTapFocus);
}

async function startCam(){
  try{
    stream=await navigator.mediaDevices.getUserMedia({
      video:{
        facingMode:{exact:'environment'},
        width:{ideal:1920,min:1280},
        height:{ideal:1080,min:720},
      },
      audio:false
    });
  }catch(e){
    // exact 실패 시 ideal로 재시도
    try{
      stream=await navigator.mediaDevices.getUserMedia({
        video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}},
        audio:false
      });
    }catch(e2){
      setSt('카메라 접근 실패: '+e2.message,'err');return;
    }
  }

  video.srcObject=stream;
  track=stream.getVideoTracks()[0];
  await new Promise(r=>video.onloadedmetadata=r);
  await video.play();

  // 카메라 능력 확인 및 초점 설정
  const cap=track.getCapabilities?track.getCapabilities():{};
  const settings=track.getSettings?track.getSettings():{};

  console.log('Camera capabilities:',cap);
  console.log('Camera settings:',settings);

  // 줌 설정
  if(cap.zoom){
    const zr=document.getElementById('zoomR');
    zr.min=cap.zoom.min;zr.max=Math.min(cap.zoom.max,8);
    // 초기 줌 2x로 설정 (근접 바코드 초점 도움)
    const initZoom=Math.min(2,cap.zoom.max);
    zr.value=initZoom;
    document.getElementById('zoomV').textContent=initZoom.toFixed(1)+'x';
    try{await track.applyConstraints({advanced:[{zoom:initZoom}]})}catch(e){}
  }

  // 초점 모드 설정
  await applyFocus();

  setSt('카메라 준비 완료 — 화면 탭으로 초점 조절','ok');
  scanning=true;
  scanLoop();
}

// ===== 초점 제어 =====
async function applyFocus(){
  if(!track)return;
  const cap=track.getCapabilities?track.getCapabilities():{};

  if(afOn){
    // 연속 자동초점 시도
    if(cap.focusMode){
      const modes=cap.focusMode;
      if(modes.includes('continuous')){
        try{await track.applyConstraints({advanced:[{focusMode:'continuous'}]});return}catch(e){}
      }
      if(modes.includes('single-shot')){
        try{await track.applyConstraints({advanced:[{focusMode:'single-shot'}]});return}catch(e){}
      }
    }
  } else {
    // 수동 초점 — focusDistance 가능하면 중간값으로
    if(cap.focusMode&&cap.focusMode.includes('manual')&&cap.focusDistance){
      const mid=(cap.focusDistance.min+cap.focusDistance.max)*0.3; // 가까운 쪽
      try{await track.applyConstraints({advanced:[{focusMode:'manual',focusDistance:mid}]})}catch(e){}
    }
  }
}

// 탭하여 초점 맞추기
async function onTapFocus(e){
  if(!track)return;
  const cap=track.getCapabilities?track.getCapabilities():{};
  const rect=e.currentTarget.getBoundingClientRect();
  const x=e.clientX-rect.left,y=e.clientY-rect.top;

  // 초점 링 표시
  const ring=document.getElementById('focusRing');
  ring.style.left=x+'px';ring.style.top=y+'px';
  ring.classList.remove('done');ring.classList.add('show');
  setTimeout(()=>{ring.classList.add('done');ring.classList.remove('show')},600);

  // pointsOfInterest (일부 기기 지원)
  if(cap.pointsOfInterest){
    const px=x/rect.width,py=y/rect.height;
    try{await track.applyConstraints({advanced:[{pointsOfInterest:[{x:px,y:py}]}]})}catch(e){}
  }

  // single-shot 초점 트리거
  if(cap.focusMode&&cap.focusMode.includes('single-shot')){
    try{
      await track.applyConstraints({advanced:[{focusMode:'single-shot'}]});
      // 초점 후 다시 continuous로
      setTimeout(async()=>{
        if(afOn&&cap.focusMode.includes('continuous')){
          try{await track.applyConstraints({advanced:[{focusMode:'continuous'}]})}catch(e){}
        }
      },1000);
    }catch(e){}
  }

  // focusMode 지원 없으면 줌으로 보완 안내
  if(!cap.focusMode||cap.focusMode.length===0){
    showToast('초점 제어 미지원 — 줌을 높여보세요');
  }
}

// ===== 스캔 루프 =====
function scanLoop(){
  if(!scanning)return;
  decode().then(()=>{
    if(scanning)requestAnimationFrame(scanLoop);
  });
}

async function decode(){
  if(!video.videoWidth||video.paused)return;

  // 영역 중앙 크롭 (스캔박스 영역만)
  const vw=video.videoWidth,vh=video.videoHeight;
  const cropW=Math.floor(vw*0.75),cropH=Math.floor(vh*0.4);
  const cropX=Math.floor((vw-cropW)/2),cropY=Math.floor((vh-cropH)/2);

  cv.width=cropW;cv.height=cropH;
  ctx.drawImage(video,cropX,cropY,cropW,cropH,0,0,cropW,cropH);

  // 이미지 선명도 향상 (contrast)
  try{
    const imgData=ctx.getImageData(0,0,cropW,cropH);
    const d=imgData.data;
    const contrast=1.3; // 대비 강화
    const factor=(259*(contrast*255+255))/(255*(259-contrast*255));
    for(let i=0;i<d.length;i+=4){
      d[i]=clamp(factor*(d[i]-128)+128);
      d[i+1]=clamp(factor*(d[i+1]-128)+128);
      d[i+2]=clamp(factor*(d[i+2]-128)+128);
    }
    ctx.putImageData(imgData,0,0);
  }catch(e){}

  // BarcodeDetector로 디코딩
  if(detector){
    try{
      const results=await detector.detect(cv);
      if(results.length>0){
        onDecoded(results[0].rawValue,results[0].format);
        return;
      }
    }catch(e){}
  }

  // 전체 프레임으로도 시도
  if(detector){
    try{
      const results2=await detector.detect(video);
      if(results2.length>0){
        onDecoded(results2[0].rawValue,results2[0].format);
      }
    }catch(e){}
  }
}

function clamp(v){return Math.max(0,Math.min(255,v|0))}

let pendingCode=null; // 등록 대기 중인 스캔 결과

function onDecoded(val,fmt){
  if(!val)return;
  const now=Date.now();
  if(val===lastCode&&now-lastTime<DUP_DELAY)return;
  lastCode=val;lastTime=now;

  // 플래시+진동
  const fl=document.getElementById('flash');fl.classList.add('on');setTimeout(()=>fl.classList.remove('on'),150);
  if(navigator.vibrate)navigator.vibrate([50,30,50]);

  const ts=new Date().toLocaleString('ko-KR');
  const fmtName=fmtN(fmt);

  // 결과 표시
  document.getElementById('lrVal').textContent=val;
  document.getElementById('lrFmt').textContent='형식: '+fmtName;
  document.getElementById('lrTm').textContent=ts;
  document.getElementById('lastR').style.display='block';

  // 등록 대기
  pendingCode={value:val,format:fmtName,time:ts,ts:now};

  showToast('스캔 완료 — 등록 버튼을 눌러주세요');

  if(!cont){scanning=false;setTimeout(()=>{scanning=true;scanLoop()},1500)}
}

function registerLast(){
  if(!pendingCode){showToast('스캔된 바코드가 없습니다');return}

  // 중복 체크 (같은 값이 이미 최근에 등록됐는지)
  const dup=hist.find(h=>h.value===pendingCode.value&&h.ts===pendingCode.ts);
  if(dup){showToast('이미 등록된 항목입니다');return}

  hist.unshift({...pendingCode});
  if(hist.length>200)hist.length=200;
  localStorage.setItem('BC_HIST',JSON.stringify(hist));
  document.getElementById('scanCnt').textContent='스캔: '+hist.length+'건';
  renderHist();
  showToast('✅ 등록완료: '+pendingCode.value);
  pendingCode=null;
}

function fmtN(f){
  const m={'qr_code':'QR','ean_13':'EAN-13','ean_8':'EAN-8','code_128':'Code128','code_39':'Code39','code_93':'Code93','codabar':'Codabar','itf':'ITF','upc_a':'UPC-A','upc_e':'UPC-E','data_matrix':'DataMatrix','pdf417':'PDF417','aztec':'Aztec'};
  if(!f)return'?';const k=f.toString().toLowerCase().replace(/ /g,'_');return m[k]||f.toString();
}

// ===== 컨트롤 =====
async function toggleAF(){
  afOn=!afOn;
  document.getElementById('btnAF').classList.toggle('on',afOn);
  document.getElementById('btnAF').textContent=afOn?'AF 초점':'MF 수동';
  await applyFocus();
  showToast(afOn?'자동초점 ON':'수동초점 (가까운 거리)');
}
async function toggleTorch(){
  if(!track)return;
  const cap=track.getCapabilities?track.getCapabilities():{};
  if(!cap.torch){showToast('조명 미지원');return}
  torchOn=!torchOn;
  try{await track.applyConstraints({advanced:[{torch:torchOn}]})}catch(e){}
  document.getElementById('btnTorch').classList.toggle('on',torchOn);
}
function toggleCont(){
  cont=!cont;
  const b=document.getElementById('btnCont');b.classList.toggle('on',cont);b.textContent=cont?'연속 ON':'연속스캔';
}
async function setZoom(v){
  if(!track)return;
  const cap=track.getCapabilities?track.getCapabilities():{};
  if(!cap.zoom)return;
  v=parseFloat(v);
  try{await track.applyConstraints({advanced:[{zoom:v}]})}catch(e){}
  document.getElementById('zoomV').textContent=v.toFixed(1)+'x';
}

// ===== 결과 =====
function copyLast(){
  const v=document.getElementById('lrVal').textContent;if(!v)return;
  navigator.clipboard.writeText(v).then(()=>showToast('복사됨')).catch(()=>{
    const t=document.createElement('textarea');t.value=v;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);showToast('복사됨');
  });
}
function searchLast(){
  const v=document.getElementById('lrVal').textContent;if(!v)return;
  window.open('https://www.google.com/search?q='+encodeURIComponent(v),'_blank');
}

// ===== 이력 =====
function renderHist(){
  const c=document.getElementById('histList');
  if(!hist.length){c.innerHTML='<div class="h-empty">스캔 이력이 없습니다</div>';return}
  c.innerHTML='';
  hist.slice(0,50).forEach((h,i)=>{
    const d=document.createElement('div');d.className='h-item';
    d.innerHTML=`<div class="h-num">${i+1}</div><div class="h-body"><div class="h-val">${esc(h.value)}</div><div class="h-meta">${h.format} · ${h.time}</div></div><button class="h-cp" onclick="cpVal('${esc(h.value)}')">📋</button>`;
    c.appendChild(d);
  });
}
function esc(s){return s.replace(/'/g,'&#39;').replace(/"/g,'&quot;').replace(/</g,'&lt;')}
function clearHist(){
  if(!hist.length)return;if(!confirm('전체 이력 삭제?'))return;
  hist.length=0;localStorage.setItem('BC_HIST','[]');
  document.getElementById('scanCnt').textContent='스캔: 0건';
  document.getElementById('lastR').style.display='none';
  renderHist();
}
function cpVal(v){
  v=v.replace(/&#39;/g,"'").replace(/&quot;/g,'"').replace(/&lt;/g,'<');
  navigator.clipboard.writeText(v).then(()=>showToast('복사: '+v)).catch(()=>{
    const t=document.createElement('textarea');t.value=v;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);showToast('복사: '+v);
  });
}

// ===== 내보내기 =====
function expCSV(){
  if(!hist.length){showToast('이력 없음');return}
  let csv='\uFEFF번호,바코드,형식,시간\n';
  hist.forEach((h,i)=>{csv+=`${i+1},"${h.value}",${h.format},"${h.time}"\n`});
  dlFile(csv,'바코드이력.csv','text/csv;charset=utf-8');
}
function expTXT(){
  if(!hist.length){showToast('이력 없음');return}
  dlFile(hist.map(h=>h.value).join('\n'),'바코드목록.txt','text/plain;charset=utf-8');
}
function dlFile(c,fn,tp){const b=new Blob([c],{type:tp}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=fn;a.click();URL.revokeObjectURL(a.href)}

// ===== UI =====
function setSt(msg,cls){const el=document.getElementById('statusBar');el.textContent=msg;el.className='status '+(cls||'')}
let tt;function showToast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('show'),2000)}

init();
</script>
