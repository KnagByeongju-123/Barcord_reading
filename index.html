<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>바코드 스캐너</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans KR',sans-serif;background:#f5f5f5;color:#212121}

    /* 메인 */
    .hdr{background:linear-gradient(135deg,#1a237e,#283593);color:#fff;padding:14px 16px;text-align:center}
    .hdr h1{font-size:18px;font-weight:700}
    .hdr p{font-size:11px;opacity:.7;margin-top:2px}

    .scan-btn{display:flex;align-items:center;justify-content:center;gap:8px;margin:16px;padding:14px;background:linear-gradient(135deg,#00c853,#00e676);color:#000;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 3px 12px rgba(0,200,83,.3);width:calc(100% - 32px)}
    .scan-btn:active{transform:scale(.97)}

    /* 결과 카드 */
    .result-card{margin:12px 16px;background:#fff;border-radius:12px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
    .rc-label{font-size:11px;color:#888;margin-bottom:4px}
    .rc-value{font-size:20px;font-weight:700;color:#2e7d32;word-break:break-all;line-height:1.3}
    .rc-fmt{font-size:11px;color:#1565c0;margin-top:3px}
    .rc-time{font-size:10px;color:#999;margin-top:2px}
    .rc-preview{margin-top:8px;border-radius:8px;max-width:100%;max-height:120px;object-fit:contain;border:1px solid #eee}
    .rc-acts{display:flex;gap:8px;margin-top:10px}
    .rc-acts button{flex:1;padding:10px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
    .rca-reg{background:#00e676;color:#000}
    .rca-retry{background:#f5f5f5;color:#555;border:1px solid #ddd}
    .rca-copy{background:#e3f2fd;color:#1565c0}

    /* 이력 */
    .sec{margin:0 12px 12px;background:#fff;border-radius:12px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
    .sec-tit{font-size:14px;font-weight:700;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
    .sec-tit button{padding:4px 10px;border:1px solid #ffcdd2;border-radius:6px;background:none;color:#c62828;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
    .h-empty{text-align:center;padding:16px;color:#aaa;font-size:13px}
    .h-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f5f5f5}.h-item:last-child{border:none}
    .h-num{width:24px;height:24px;border-radius:6px;background:#e3f2fd;color:#1565c0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
    .h-body{flex:1;min-width:0}.h-val{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .h-meta{font-size:9px;color:#999;margin-top:1px}
    .h-cp{width:26px;height:26px;border:none;border-radius:6px;background:#f5f5f5;color:#888;font-size:12px;cursor:pointer;flex-shrink:0}
    .exp-row{display:flex;gap:8px;margin:0 12px 16px}
    .exp-row button{flex:1;padding:10px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
    .e-csv{background:#1b5e20;color:#fff}.e-txt{background:#f5f5f5;color:#555;border:1px solid #ddd}

    /* 카메라 입력 숨김 */
    #camInput{display:none}
    /* 분석 캔버스 숨김 */
    #analysisCv{display:none}

    .toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#fff;padding:8px 18px;border-radius:18px;font-size:12px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}.toast.show{opacity:1}
  </style>
</head>
<body>

<div class="hdr">
  <h1>📷 바코드 스캐너</h1>
  <p>사진 촬영 또는 이미지 불러오기로 바코드 분석</p>
</div>

<!-- 초기 화면: 버튼 중앙 -->
<div id="homeScreen" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 60px);padding:0 24px;gap:16px">
  <button class="scan-btn" onclick="takePhoto()" style="margin:0;width:100%;max-width:320px;font-size:17px;padding:20px">📷 사진촬영 스캔</button>
  <button class="scan-btn" onclick="loadImage()" style="margin:0;width:100%;max-width:320px;font-size:17px;padding:20px;background:linear-gradient(135deg,#1565c0,#42a5f5);box-shadow:0 3px 12px rgba(21,101,192,.3)">🖼 이미지 불러오기</button>
  <div style="font-size:11px;color:#aaa;margin-top:8px" id="homeHistInfo"></div>
</div>

<!-- 결과/이력 화면 -->
<div id="resultScreen" style="display:none">
<div class="result-card show" id="resultCard">
  <div class="rc-label" id="rcLabel">분석 결과</div>
  <div class="rc-value" id="rcValue"></div>
  <div class="rc-fmt" id="rcFmt"></div>
  <div class="rc-time" id="rcTime"></div>
  <img class="rc-preview" id="rcPreview" style="display:none">
  <div class="rc-acts">
    <button class="rca-reg" id="btnReg" onclick="registerCode()">✅ 등록</button>
    <button class="rca-copy" onclick="copyResult()">📋 복사</button>
    <button class="rca-retry" onclick="takePhoto()">📷 재촬영</button>
    <button class="rca-retry" onclick="loadImage()" style="background:#e3f2fd;color:#1565c0;border-color:#90caf9">🖼 이미지</button>
  </div>
</div>

<div class="sec">
  <div class="sec-tit"><span>📋 스캔 이력 (<span id="histCnt">0</span>건)</span><button onclick="clearHist()">전체삭제</button></div>
  <div id="histList"><div class="h-empty">스캔 이력이 없습니다</div></div>
</div>
<div class="exp-row">
  <button class="e-csv" onclick="expCSV()">📥 CSV</button>
  <button class="e-txt" onclick="expTXT()">📄 TXT</button>
</div>
<div style="text-align:center;padding:0 12px 20px">
  <button onclick="goHome()" style="width:100%;padding:12px;border:1.5px solid #ddd;border-radius:10px;background:#fff;color:#555;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">← 처음으로</button>
</div>
</div><!-- resultScreen 닫기 -->

<input type="file" id="camInput" accept="image/*" capture="environment">
<input type="file" id="imgInput" accept="image/*">
<canvas id="analysisCv"></canvas>

<div class="toast" id="toast"></div>

<script>
let hist=JSON.parse(localStorage.getItem('BC_HIST')||'[]');
let pendingCode=null;

// ===== 사진 촬영 / 이미지 불러오기 =====
function takePhoto(){
  document.getElementById('camInput').click();
}
function loadImage(){
  document.getElementById('imgInput').click();
}

function handleFile(file){
  if(!file)return;
  // 결과 화면으로 전환
  document.getElementById('homeScreen').style.display='none';
  document.getElementById('resultScreen').style.display='block';
  const card=document.getElementById('resultCard');
  card.classList.add('show');
  document.getElementById('rcLabel').textContent='분석 중...';
  document.getElementById('rcValue').textContent='';
  document.getElementById('rcFmt').textContent='';
  document.getElementById('rcTime').textContent='';
  document.getElementById('btnReg').disabled=true;

  const preview=document.getElementById('rcPreview');
  const imgUrl=URL.createObjectURL(file);
  preview.src=imgUrl;
  preview.style.display='block';

  const img=new Image();
  img.onload=async()=>{
    URL.revokeObjectURL(imgUrl);
    await analyzeBarcode(img);
  };
  img.src=URL.createObjectURL(file);
}

function goHome(){
  document.getElementById('resultScreen').style.display='none';
  document.getElementById('homeScreen').style.display='flex';
  updateHomeInfo();
}

function updateHomeInfo(){
  const el=document.getElementById('homeHistInfo');
  if(hist.length)el.textContent='이력 '+hist.length+'건 저장됨';
  else el.textContent='';
}

document.getElementById('camInput').addEventListener('change',function(e){
  handleFile(e.target.files[0]);e.target.value='';
});
document.getElementById('imgInput').addEventListener('change',function(e){
  handleFile(e.target.files[0]);e.target.value='';
});

// ===== 바코드 분석 =====
async function analyzeBarcode(img){
  const cv=document.getElementById('analysisCv');
  const ctx=cv.getContext('2d');

  // 중앙 가로 8:1 크롭 (바코드 영역만)
  const cropW=img.width;
  const cropH=Math.floor(img.width/8);
  const cropY=Math.floor((img.height-cropH)/2);
  cv.width=cropW;
  cv.height=cropH;
  ctx.drawImage(img,0,cropY,cropW,cropH,0,0,cropW,cropH);

  let found=false;

  // 1차: 크롭 영역에서 BarcodeDetector
  if('BarcodeDetector' in window){
    try{
      const detector=new BarcodeDetector({formats:await BarcodeDetector.getSupportedFormats()});
      const results=await detector.detect(cv);
      if(results.length>0){showResult(results[0].rawValue,results[0].format);found=true}
    }catch(e){}
  }

  // 2차: 크롭 영역에서 html5-qrcode
  if(!found){
    try{
      const blob=await new Promise(r=>cv.toBlob(r,'image/jpeg',0.95));
      const file=new File([blob],'scan.jpg',{type:'image/jpeg'});
      const qr=new Html5Qrcode('analysisCv');
      const result=await qr.scanFileV2(file,true);
      if(result&&result.decodedText){showResult(result.decodedText,result.result&&result.result.format?result.result.format.formatName:'unknown');found=true}
      qr.clear();
    }catch(e){}
  }

  // 3차: 크롭 이진화 후 재시도
  if(!found){
    try{
      const imgData=ctx.getImageData(0,0,cropW,cropH);
      const d=imgData.data;
      for(let i=0;i<d.length;i+=4){const g=d[i]*.299+d[i+1]*.587+d[i+2]*.114;const bw=g>128?255:0;d[i]=bw;d[i+1]=bw;d[i+2]=bw}
      ctx.putImageData(imgData,0,0);
      if('BarcodeDetector' in window){
        const det=new BarcodeDetector({formats:await BarcodeDetector.getSupportedFormats()});
        const r=await det.detect(cv);if(r.length>0){showResult(r[0].rawValue,r[0].format);found=true}
      }
      if(!found){
        const blob=await new Promise(r=>cv.toBlob(r,'image/jpeg',0.95));
        const file=new File([blob],'s2.jpg',{type:'image/jpeg'});
        const qr=new Html5Qrcode('analysisCv');
        const result=await qr.scanFileV2(file,true);
        if(result&&result.decodedText){showResult(result.decodedText,result.result&&result.result.format?result.result.format.formatName:'unknown');found=true}
        qr.clear();
      }
    }catch(e){}
  }

  // 4차: 전체 원본으로 재시도 (크롭에서 못찾은 경우)
  if(!found){
    cv.width=img.width;cv.height=img.height;ctx.drawImage(img,0,0);
    if('BarcodeDetector' in window){
      try{
        const det=new BarcodeDetector({formats:await BarcodeDetector.getSupportedFormats()});
        const r=await det.detect(cv);if(r.length>0){showResult(r[0].rawValue,r[0].format);found=true}
      }catch(e){}
    }
    if(!found){
      try{
        const blob=await new Promise(r=>cv.toBlob(r,'image/jpeg',0.95));
        const file=new File([blob],'s3.jpg',{type:'image/jpeg'});
        const qr=new Html5Qrcode('analysisCv');
        const result=await qr.scanFileV2(file,true);
        if(result&&result.decodedText){showResult(result.decodedText,result.result&&result.result.format?result.result.format.formatName:'unknown');found=true}
        qr.clear();
      }catch(e){}
    }
  }

  if(!found){
    document.getElementById('rcLabel').textContent='분석 실패';
    document.getElementById('rcValue').textContent='바코드를 인식하지 못했습니다';
    document.getElementById('rcValue').style.color='#c62828';
    document.getElementById('rcFmt').textContent='바코드를 사진 중앙에 가로로 배치해 주세요';
    document.getElementById('btnReg').disabled=true;
    showToast('인식 실패 — 재촬영해 주세요');
  }
}

function showResult(value,format){
  const fmt=fmtName(format);
  const ts=new Date().toLocaleString('ko-KR');
  pendingCode={value,format:fmt,time:ts,ts:Date.now()};

  document.getElementById('rcLabel').textContent='분석 완료';
  document.getElementById('rcValue').textContent=value;
  document.getElementById('rcValue').style.color='#2e7d32';
  document.getElementById('rcFmt').textContent='형식: '+fmt;
  document.getElementById('rcTime').textContent=ts;
  document.getElementById('btnReg').disabled=false;

  if(navigator.vibrate)navigator.vibrate([50,30,50]);
  showToast('✅ '+value);
}

function registerCode(){
  if(!pendingCode)return;
  if(!hist.find(h=>h.value===pendingCode.value&&h.ts===pendingCode.ts)){
    hist.unshift({...pendingCode});if(hist.length>200)hist.length=200;
    localStorage.setItem('BC_HIST',JSON.stringify(hist));
    renderHist();
    showToast('✅ 등록: '+pendingCode.value);
  }else{showToast('이미 등록됨')}
  pendingCode=null;
  document.getElementById('btnReg').disabled=true;
  document.getElementById('rcLabel').textContent='등록 완료';
}

function copyResult(){
  const v=document.getElementById('rcValue').textContent;
  if(!v)return;
  navigator.clipboard.writeText(v).then(()=>showToast('복사됨')).catch(()=>{
    const t=document.createElement('textarea');t.value=v;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);showToast('복사됨');
  });
}

function fmtName(f){
  if(!f)return'?';const s=f.toString().toUpperCase();
  return{'QR_CODE':'QR','CODE_39':'Code39','CODE_128':'Code128','CODE_93':'Code93','EAN_13':'EAN-13','EAN_8':'EAN-8','UPC_A':'UPC-A','UPC_E':'UPC-E','ITF':'ITF','CODABAR':'Codabar','DATA_MATRIX':'DataMatrix','PDF_417':'PDF417'}[s]||s;
}

// ===== 이력 =====
function renderHist(){
  const c=document.getElementById('histList');document.getElementById('histCnt').textContent=hist.length;
  if(!hist.length){c.innerHTML='<div class="h-empty">스캔 이력이 없습니다</div>';return}
  c.innerHTML='';
  hist.slice(0,100).forEach((h,i)=>{
    const d=document.createElement('div');d.className='h-item';
    d.innerHTML=`<div class="h-num">${i+1}</div><div class="h-body"><div class="h-val">${esc(h.value)}</div><div class="h-meta">${h.format} · ${h.time}</div></div><button class="h-cp" onclick="cpVal('${esc(h.value)}')">📋</button>`;
    c.appendChild(d);
  });
}
function clearHist(){if(!hist.length)return;if(!confirm('전체 이력 삭제?'))return;hist.length=0;localStorage.setItem('BC_HIST','[]');renderHist()}
function expCSV(){if(!hist.length){showToast('이력 없음');return}let csv='\uFEFF번호,바코드,형식,시간\n';hist.forEach((h,i)=>{csv+=`${i+1},"${h.value}",${h.format},"${h.time}"\n`});dlF(csv,'바코드이력.csv','text/csv;charset=utf-8')}
function expTXT(){if(!hist.length){showToast('이력 없음');return}dlF(hist.map(h=>h.value).join('\n'),'바코드목록.txt','text/plain;charset=utf-8')}
function dlF(c,fn,tp){const b=new Blob([c],{type:tp}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=fn;a.click();URL.revokeObjectURL(a.href)}

let tt;function showToast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('show'),2000)}

renderHist();updateHomeInfo();
</script>
</body>
</html>
