<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>입고 로트추적 스캐너</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans KR',sans-serif;background:#f0f2f5;color:#212121;padding-bottom:60px}
    /* 헤더 */
    .hdr{background:linear-gradient(135deg,#1a237e,#283593);color:#fff;padding:12px 16px;text-align:center}
    .hdr h1{font-size:17px;font-weight:700}.hdr p{font-size:10px;opacity:.7;margin-top:2px}
    /* 탭 */
    .tabs{display:flex;background:#fff;border-bottom:2px solid #e0e0e0;position:sticky;top:0;z-index:50}
    .tab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;color:#888}
    .tab.on{color:#1a237e;border-bottom-color:#1a237e}
    /* 패널 */
    .pnl{display:none;padding:12px}.pnl.on{display:block}
    /* 카드 */
    .card{background:#fff;border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
    .card-tit{font-size:14px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
    /* 입력 */
    .fg{margin-bottom:12px}
    .fg label{display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:4px}
    .fg select,.fg input,.fg textarea{width:100%;padding:10px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;font-family:inherit;background:#fff}
    .fg select{appearance:auto}
    .fg textarea{resize:vertical;min-height:48px}
    /* 버튼 */
    .btn{padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;width:100%}
    .btn:active{transform:scale(.97)}
    .btn-green{background:linear-gradient(135deg,#00c853,#00e676);color:#000;box-shadow:0 2px 8px rgba(0,200,83,.2)}
    .btn-blue{background:linear-gradient(135deg,#1565c0,#42a5f5);color:#fff;box-shadow:0 2px 8px rgba(21,101,192,.2)}
    .btn-red{background:#ffebee;color:#c62828;border:1px solid #ffcdd2}
    .btn-gray{background:#f5f5f5;color:#555;border:1px solid #ddd}
    .btn-sm{padding:8px 12px;font-size:12px;width:auto;border-radius:8px}
    .btn-row{display:flex;gap:8px;margin-bottom:12px}
    .btn-row .btn{flex:1}
    /* 스캔결과 */
    .scan-result{background:#e8f5e9;border:1.5px solid #a5d6a7;border-radius:10px;padding:12px;margin-bottom:12px;display:none}
    .scan-result.show{display:block}
    .scan-result.fail{background:#ffebee;border-color:#ef9a9a}
    .sr-val{font-size:18px;font-weight:700;color:#2e7d32;word-break:break-all}
    .scan-result.fail .sr-val{color:#c62828}
    .sr-fmt{font-size:11px;color:#1565c0;margin-top:2px}
    .sr-img{max-width:100%;max-height:100px;border-radius:6px;margin-top:6px;border:1px solid #ddd}
    /* 이력 */
    .h-empty{text-align:center;padding:20px;color:#aaa;font-size:13px}
    .h-item{padding:10px 0;border-bottom:1px solid #f0f0f0}
    .h-item:last-child{border:none}
    .hi-top{display:flex;justify-content:space-between;align-items:center}
    .hi-code{font-size:14px;font-weight:700;color:#1a237e}
    .hi-time{font-size:10px;color:#999}
    .hi-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
    .hi-tag{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600}
    .ht-cat{background:#e3f2fd;color:#1565c0}
    .ht-sub{background:#f3e5f5;color:#7b1fa2}
    .ht-qty{background:#e8f5e9;color:#2e7d32}
    .hi-note{font-size:11px;color:#666;margin-top:3px}
    .hi-acts{display:flex;gap:4px;margin-top:4px}
    .hi-acts button{padding:3px 8px;border:none;border-radius:4px;font-size:10px;font-weight:600;cursor:pointer;font-family:inherit}
    .ha-cp{background:#e3f2fd;color:#1565c0}.ha-del{background:#ffebee;color:#c62828}
    /* 항목관리 */
    .cat-section{margin-bottom:14px;border:1px solid #e0e0e0;border-radius:10px;overflow:hidden}
    .cat-hdr{display:flex;align-items:center;gap:4px;padding:8px 10px;background:#f5f5f5}
    .cat-hdr input{flex:1;padding:6px 8px;border:1px solid #ddd;border-radius:6px;font-size:13px;font-family:inherit;font-weight:600;min-width:0}
    .cat-body{padding:8px 12px;background:#fafafa}
    .sub-item{display:flex;align-items:center;gap:4px;padding:4px 0;border-bottom:1px solid #eee;font-size:13px}
    .sub-item:last-child{border:none}
    .sub-item input{flex:1;padding:5px 8px;border:1px solid #ddd;border-radius:5px;font-size:12px;font-family:inherit}
    .s-move{width:24px;height:24px;border:none;border-radius:4px;background:#f0f0f0;font-size:12px;cursor:pointer;color:#888;display:flex;align-items:center;justify-content:center}
    .s-del{width:24px;height:24px;border:none;border-radius:4px;background:#ffebee;color:#c62828;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .add-btn{width:100%;padding:6px;border:1.5px dashed #ccc;border-radius:6px;background:none;color:#999;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:4px}
    /* 숨김 */
    #camInput,#imgInput,#analysisCv{display:none}
    .toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#fff;padding:8px 18px;border-radius:18px;font-size:12px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}.toast.show{opacity:1}
  </style>
</head>
<body>
<div class="hdr"><h1>📦 입고 로트추적 스캐너</h1><p>바코드 스캔 기반 입고/이력 관리</p></div>
<div class="tabs">
  <div class="tab on" id="tab0" onclick="swTab(0)">📝 등록</div>
  <div class="tab" id="tab1" onclick="swTab(1)">📋 이력</div>
  <div class="tab" id="tab2" onclick="swTab(2)">⚙ 항목관리</div>
</div>

<!-- ===== 등록 ===== -->
<div class="pnl on" id="pnl0">
  <div class="card">
    <div class="card-tit">📦 입고 등록</div>
    <div id="regFields"></div>
  </div>

  <div class="card">
    <div class="card-tit">📷 바코드 스캔 (사진 방식)</div>
    <div class="btn-row">
      <button class="btn btn-green" onclick="takePhoto()">📷 사진촬영</button>
      <button class="btn btn-blue" onclick="loadImage()">🖼 이미지</button>
    </div>
    <div class="scan-result" id="scanResult">
      <div class="sr-val" id="srVal"></div>
      <div class="sr-fmt" id="srFmt"></div>
      <img class="sr-img" id="srImg" style="display:none">
    </div>
  </div>

  <div class="card">
    <div class="card-tit">📱 QR코드 스캔 (실시간 카메라)</div>
    <div id="qrPreview" style="display:none">
      <div id="qrReader" style="width:100%;border-radius:8px;overflow:hidden"></div>
      <div style="margin-top:8px;text-align:center">
        <button class="btn btn-sm btn-gray" onclick="stopQr()">카메라 닫기</button>
      </div>
    </div>
    <div id="qrBtnWrap">
      <button class="btn btn-green" onclick="startQr()" style="background:linear-gradient(135deg,#7b1fa2,#ab47bc);box-shadow:0 2px 8px rgba(123,31,162,.2)">📱 QR 스캔 시작</button>
    </div>
    <div class="scan-result" id="qrResult">
      <div class="sr-val" id="qrVal"></div>
      <div class="sr-fmt" id="qrFmt"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-tit">📝 추가 정보</div>
    <div class="fg">
      <label>수량</label>
      <input type="number" id="inpQty" placeholder="수량 입력" inputmode="numeric">
    </div>
    <div class="fg">
      <label>비고</label>
      <textarea id="inpNote" placeholder="비고 사항 입력"></textarea>
    </div>
  </div>

  <button class="btn btn-green" id="btnSave" onclick="saveEntry()" style="font-size:16px;padding:14px">✅ 등록 저장</button>
</div>

<!-- ===== 이력 ===== -->
<div class="pnl" id="pnl1">
  <div class="card">
    <div class="card-tit" style="justify-content:space-between">
      <span>📋 입고 이력 (<span id="histCnt">0</span>건)</span>
      <div style="display:flex;gap:4px">
        <button class="btn btn-sm btn-gray" onclick="expXlsx()">📥 엑셀</button>
        <button class="btn btn-sm btn-red" onclick="clearHist()">전체삭제</button>
      </div>
    </div>
    <!-- 필터 -->
    <div style="display:flex;gap:6px;margin-bottom:10px">
      <select id="filtCat" onchange="renderHist()" style="flex:1;padding:6px;border:1px solid #ddd;border-radius:6px;font-size:12px;font-family:inherit"><option value="">전체 분류</option></select>
      <input type="date" id="filtDate" onchange="renderHist()" style="padding:6px;border:1px solid #ddd;border-radius:6px;font-size:12px;font-family:inherit">
    </div>
    <div id="histList"><div class="h-empty">이력이 없습니다</div></div>
  </div>
</div>

<!-- ===== 항목관리 ===== -->
<div class="pnl" id="pnl2">
  <div class="card">
    <div class="card-tit" style="justify-content:space-between">
      <span>⚙ 분류 항목 관리</span>
      <button class="btn btn-sm btn-gray" onclick="resetCats()">기본값</button>
    </div>
    <div id="catEditor"></div>
    <button class="add-btn" onclick="addCat()" style="margin-top:8px;padding:10px;font-size:13px">+ 분류 추가</button>
    <div style="margin-top:12px">
      <button class="btn btn-green" onclick="saveCats()">적용 저장</button>
    </div>
  </div>
</div>

<input type="file" id="camInput" accept="image/*" capture="environment">
<input type="file" id="imgInput" accept="image/*">
<canvas id="analysisCv"></canvas>
<div class="toast" id="toast"></div>

<script>
// ===== 기본 데이터 =====
const DEFAULT_CATS=[
  {name:'공급사',subs:['태경스틸','동일스텐','정민스틸','나스테크']},
  {name:'소재',subs:['SPCC','SUS430','SUS304','S70C','S55C']},
  {name:'규격',subs:['60','70','80']}
];

let cats=JSON.parse(localStorage.getItem('LOT_CATS')||'null')||JSON.parse(JSON.stringify(DEFAULT_CATS));
let hist=JSON.parse(localStorage.getItem('LOT_HIST')||'[]');
let pendingScan=null; // {value,format}

// ===== 탭 =====
function swTab(n){
  document.querySelectorAll('.tab').forEach((t,i)=>{t.classList.toggle('on',i===n)});
  document.querySelectorAll('.pnl').forEach((p,i)=>{p.classList.toggle('on',i===n)});
  if(n!==0)stopQr(); // 다른 탭 이동 시 QR 카메라 정리
  if(n===0){renderRegFields()}
  if(n===1){renderHistFilter();renderHist()}
  if(n===2){renderCatEditor()}
}

// ===== 등록 탭: 항목 셀렉트 =====
let savedSelections={}; // 선택값 보존용

function renderRegFields(){
  // 기존 선택값 저장
  cats.forEach((cat,i)=>{
    const el=document.getElementById('sel_'+i);
    if(el&&el.value)savedSelections[cat.name]=el.value;
  });
  const c=document.getElementById('regFields');
  c.innerHTML='';
  cats.forEach((cat,i)=>{
    const prev=savedSelections[cat.name]||'';
    const div=document.createElement('div');div.className='fg';
    div.innerHTML=`<label>${cat.name}</label><select id="sel_${i}"><option value="">선택하세요</option>${cat.subs.map(s=>'<option value="'+s+'"'+(s===prev?' selected':'')+'>'+s+'</option>').join('')}</select>`;
    c.appendChild(div);
  });
}

// ===== 사진/이미지 =====
function takePhoto(){document.getElementById('camInput').click()}
function loadImage(){document.getElementById('imgInput').click()}
document.getElementById('camInput').addEventListener('change',e=>{handleFile(e.target.files[0]);e.target.value=''});
document.getElementById('imgInput').addEventListener('change',e=>{handleFile(e.target.files[0]);e.target.value=''});

function handleFile(file){
  if(!file)return;
  const sr=document.getElementById('scanResult');
  sr.classList.add('show');sr.classList.remove('fail');
  document.getElementById('srVal').textContent='분석 중...';
  document.getElementById('srFmt').textContent='';
  const imgUrl=URL.createObjectURL(file);
  const preview=document.getElementById('srImg');
  preview.src=imgUrl;preview.style.display='block';
  const img=new Image();
  img.onload=async()=>{URL.revokeObjectURL(imgUrl);await analyzeBarcode(img)};
  img.src=URL.createObjectURL(file);
}

async function analyzeBarcode(img){
  const cv=document.getElementById('analysisCv'),ctx=cv.getContext('2d');
  // 중앙 가로 8:1 크롭
  const cropW=img.width,cropH=Math.floor(img.width/8),cropY=Math.floor((img.height-cropH)/2);
  cv.width=cropW;cv.height=cropH;ctx.drawImage(img,0,cropY,cropW,cropH,0,0,cropW,cropH);
  let found=false;
  // 1: BarcodeDetector 크롭
  if('BarcodeDetector' in window){
    try{const det=new BarcodeDetector({formats:await BarcodeDetector.getSupportedFormats()});const r=await det.detect(cv);if(r.length>0){scanOk(r[0].rawValue,r[0].format);found=true}}catch(e){}
  }
  // 2: html5-qrcode 크롭
  if(!found){try{const blob=await new Promise(r=>cv.toBlob(r,'image/jpeg',.95));const f=new File([blob],'s.jpg',{type:'image/jpeg'});const qr=new Html5Qrcode('analysisCv');const res=await qr.scanFileV2(f,true);if(res&&res.decodedText){scanOk(res.decodedText,res.result&&res.result.format?res.result.format.formatName:'unknown');found=true}qr.clear()}catch(e){}}
  // 3: 이진화 크롭
  if(!found){try{const id=ctx.getImageData(0,0,cropW,cropH),d=id.data;for(let i=0;i<d.length;i+=4){const g=d[i]*.299+d[i+1]*.587+d[i+2]*.114;const bw=g>128?255:0;d[i]=bw;d[i+1]=bw;d[i+2]=bw}ctx.putImageData(id,0,0);
    if('BarcodeDetector' in window){const det=new BarcodeDetector({formats:await BarcodeDetector.getSupportedFormats()});const r=await det.detect(cv);if(r.length>0){scanOk(r[0].rawValue,r[0].format);found=true}}
    if(!found){const blob=await new Promise(r=>cv.toBlob(r,'image/jpeg',.95));const f=new File([blob],'s2.jpg',{type:'image/jpeg'});const qr=new Html5Qrcode('analysisCv');const res=await qr.scanFileV2(f,true);if(res&&res.decodedText){scanOk(res.decodedText,res.result&&res.result.format?res.result.format.formatName:'unknown');found=true}qr.clear()}
  }catch(e){}}
  // 4: 전체 원본
  if(!found){cv.width=img.width;cv.height=img.height;ctx.drawImage(img,0,0);
    if('BarcodeDetector' in window){try{const det=new BarcodeDetector({formats:await BarcodeDetector.getSupportedFormats()});const r=await det.detect(cv);if(r.length>0){scanOk(r[0].rawValue,r[0].format);found=true}}catch(e){}}
    if(!found){try{const blob=await new Promise(r=>cv.toBlob(r,'image/jpeg',.95));const f=new File([blob],'s3.jpg',{type:'image/jpeg'});const qr=new Html5Qrcode('analysisCv');const res=await qr.scanFileV2(f,true);if(res&&res.decodedText){scanOk(res.decodedText,res.result&&res.result.format?res.result.format.formatName:'unknown');found=true}qr.clear()}catch(e){}}
  }
  if(!found){scanFail()}
}

function scanOk(val,fmt){
  pendingScan={value:val,format:fmtN(fmt)};
  const sr=document.getElementById('scanResult');sr.classList.remove('fail');
  document.getElementById('srVal').textContent=val;
  document.getElementById('srFmt').textContent='형식: '+fmtN(fmt);
  if(navigator.vibrate)navigator.vibrate([50,30,50]);
  showToast('✅ '+val);
}
function scanFail(){
  pendingScan=null;
  const sr=document.getElementById('scanResult');sr.classList.add('fail');
  document.getElementById('srVal').textContent='인식 실패';
  document.getElementById('srFmt').textContent='바코드를 중앙에 놓고 재촬영하세요';
  showToast('인식 실패');
}
function fmtN(f){if(!f)return'?';const s=f.toString().toUpperCase();return{'QR_CODE':'QR','CODE_39':'Code39','CODE_128':'Code128','CODE_93':'Code93','EAN_13':'EAN-13','EAN_8':'EAN-8','UPC_A':'UPC-A','UPC_E':'UPC-E','ITF':'ITF','CODABAR':'Codabar','DATA_MATRIX':'DataMatrix','PDF_417':'PDF417'}[s]||s}

// ===== QR코드 실시간 스캔 =====
let qrScanner=null;

async function startQr(){
  document.getElementById('qrBtnWrap').style.display='none';
  document.getElementById('qrPreview').style.display='block';
  document.getElementById('qrResult').classList.remove('show');

  qrScanner=new Html5Qrcode('qrReader');
  try{
    await qrScanner.start(
      {facingMode:'environment'},
      {fps:15,qrbox:{width:250,height:250},
        formatsToSupport:[
          Html5QrcodeSupportedFormats.QR_CODE,
          Html5QrcodeSupportedFormats.DATA_MATRIX,
          Html5QrcodeSupportedFormats.PDF_417,
          Html5QrcodeSupportedFormats.AZTEC,
          Html5QrcodeSupportedFormats.CODE_128,
          Html5QrcodeSupportedFormats.CODE_39,
          Html5QrcodeSupportedFormats.EAN_13,
          Html5QrcodeSupportedFormats.EAN_8,
          Html5QrcodeSupportedFormats.UPC_A,
        ],
        experimentalFeatures:{useBarCodeDetectorIfSupported:true}
      },
      onQrSuccess,
      ()=>{}
    );
  }catch(e){
    showToast('카메라 오류: '+e);
    stopQr();
  }
}

function onQrSuccess(text,result){
  const fmt=result.result&&result.result.format?result.result.format.formatName:'QR_CODE';
  pendingScan={value:text,format:fmtN(fmt)};

  // 결과 표시
  const sr=document.getElementById('qrResult');
  sr.classList.add('show');sr.classList.remove('fail');
  document.getElementById('qrVal').textContent=text;
  document.getElementById('qrFmt').textContent='형식: '+fmtN(fmt);

  if(navigator.vibrate)navigator.vibrate([50,30,50]);
  showToast('✅ '+text);

  // 스캔 멈춤
  stopQr();
}

async function stopQr(){
  if(qrScanner){
    try{await qrScanner.stop()}catch(e){}
    try{qrScanner.clear()}catch(e){}
    qrScanner=null;
  }
  document.getElementById('qrPreview').style.display='none';
  document.getElementById('qrBtnWrap').style.display='block';
}

// ===== 저장 =====
function saveEntry(){
  const qty=document.getElementById('inpQty').value;
  const note=document.getElementById('inpNote').value;
  if(!pendingScan){showToast('바코드 또는 QR코드를 스캔하세요');return}

  // 각 대항목별 선택값 수집
  const fields={};
  let hasSelection=false;
  cats.forEach((cat,i)=>{
    const v=document.getElementById('sel_'+i).value;
    fields[cat.name]=v||'';
    if(v)hasSelection=true;
  });
  if(!hasSelection){showToast('항목을 1개 이상 선택하세요');return}

  const now=new Date();
  const entry={
    id:'E'+now.getTime(),
    date:now.toISOString().split('T')[0],
    time:String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0'),
    fields,
    barcode:pendingScan.value,
    format:pendingScan.format,
    qty:qty||'',
    note:note||'',
    ts:now.toISOString()
  };
  hist.unshift(entry);if(hist.length>500)hist.length=500;
  localStorage.setItem('LOT_HIST',JSON.stringify(hist));

  // 초기화 (바코드/수량/비고만, 항목 선택은 유지)
  pendingScan=null;
  document.getElementById('scanResult').classList.remove('show');
  document.getElementById('srImg').style.display='none';
  document.getElementById('inpQty').value='';
  document.getElementById('inpNote').value='';
  showToast('✅ 등록 완료: '+entry.barcode);
}

// ===== 이력 =====
function renderHistFilter(){
  const fc=document.getElementById('filtCat');
  fc.innerHTML='<option value="">전체 분류</option>';
  cats.forEach(c=>{const o=document.createElement('option');o.value=c.name;o.textContent=c.name;fc.appendChild(o)});
}
function renderHist(){
  const c=document.getElementById('histList');document.getElementById('histCnt').textContent=hist.length;
  const fc=document.getElementById('filtCat').value;
  const fd=document.getElementById('filtDate').value;
  let filtered=hist;
  if(fc)filtered=filtered.filter(h=>{
    // 구버전 호환 (cat 필드) + 신버전 (fields)
    if(h.fields){return Object.values(h.fields).some(v=>v&&(h.fields[fc]||Object.keys(h.fields).includes(fc)))}
    return h.cat===fc;
  });
  if(fd)filtered=filtered.filter(h=>h.date===fd);
  if(!filtered.length){c.innerHTML='<div class="h-empty">이력이 없습니다</div>';return}
  c.innerHTML='';
  filtered.slice(0,100).forEach((h,i)=>{
    let tags='';
    if(h.fields){
      Object.entries(h.fields).forEach(([k,v])=>{if(v)tags+=`<span class="hi-tag ht-cat">${k}: ${v}</span>`});
    }else{
      tags=`<span class="hi-tag ht-cat">${h.cat}</span><span class="hi-tag ht-sub">${h.sub}</span>`;
    }
    if(h.qty)tags+=`<span class="hi-tag ht-qty">수량: ${h.qty}</span>`;
    tags+=`<span class="hi-tag" style="background:#f5f5f5;color:#888">${h.format}</span>`;
    const d=document.createElement('div');d.className='h-item';
    d.innerHTML=`<div class="hi-top"><span class="hi-code">${h.barcode}</span><span class="hi-time">${h.date} ${h.time}</span></div>
      <div class="hi-tags">${tags}</div>
      ${h.note?'<div class="hi-note">📝 '+h.note+'</div>':''}
      <div class="hi-acts"><button class="ha-cp" onclick="cpVal('${esc(h.barcode)}')">📋복사</button><button class="ha-del" onclick="delHist('${h.id}')">🗑삭제</button></div>`;
    c.appendChild(d);
  });
}
function delHist(id){if(!confirm('삭제?'))return;hist=hist.filter(h=>h.id!==id);localStorage.setItem('LOT_HIST',JSON.stringify(hist));renderHist()}
function clearHist(){if(!hist.length)return;if(!confirm('전체 이력 삭제?'))return;hist.length=0;localStorage.setItem('LOT_HIST','[]');renderHist()}
function esc(s){return s.replace(/'/g,'&#39;').replace(/"/g,'&quot;').replace(/</g,'&lt;')}
function cpVal(v){v=v.replace(/&#39;/g,"'");navigator.clipboard.writeText(v).then(()=>showToast('복사: '+v)).catch(()=>{const t=document.createElement('textarea');t.value=v;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);showToast('복사: '+v)})}

function expXlsx(){
  if(!hist.length){showToast('이력 없음');return}
  const wb=XLSX.utils.book_new();
  const catNames=cats.map(c=>c.name);
  const hd=['일자','시간',...catNames,'바코드','형식','수량','비고'];
  const rows=hist.map(h=>{
    const row=[h.date,h.time];
    catNames.forEach(cn=>{row.push(h.fields?h.fields[cn]||'':cn===h.cat?h.sub:'')});
    row.push(h.barcode,h.format,h.qty,h.note);
    return row;
  });
  const wd=[['입고 로트추적 이력'],[],hd,...rows];
  const ws=XLSX.utils.aoa_to_sheet(wd);
  ws['!cols']=[{wch:11},{wch:9},...catNames.map(()=>({wch:12})),{wch:24},{wch:8},{wch:8},{wch:20}];
  ws['!merges']=[{s:{r:0,c:0},e:{r:0,c:hd.length-1}}];
  XLSX.utils.book_append_sheet(wb,ws,'입고이력');
  XLSX.writeFile(wb,`입고이력_${new Date().toISOString().split('T')[0].replace(/-/g,'')}.xlsx`);
}

// ===== 항목관리 =====
function renderCatEditor(){
  const c=document.getElementById('catEditor');c.innerHTML='';
  cats.forEach((cat,ci)=>{
    const sec=document.createElement('div');sec.className='cat-section';
    let subsHtml=cat.subs.map((s,si)=>`<div class="sub-item">
      <button class="s-move" onclick="moveSub(${ci},${si},-1)">▲</button>
      <button class="s-move" onclick="moveSub(${ci},${si},1)">▼</button>
      <input value="${s}" oninput="cats[${ci}].subs[${si}]=this.value">
      <button class="s-del" onclick="delSub(${ci},${si})">✕</button>
    </div>`).join('');
    sec.innerHTML=`<div class="cat-hdr">
      <button class="s-move" onclick="moveCat(${ci},-1)">▲</button>
      <button class="s-move" onclick="moveCat(${ci},1)">▼</button>
      <input value="${cat.name}" oninput="cats[${ci}].name=this.value">
      <button class="s-del" onclick="delCat(${ci})">✕</button>
    </div>
    <div class="cat-body">${subsHtml}<button class="add-btn" onclick="addSub(${ci})">+ 항목 추가</button></div>`;
    c.appendChild(sec);
  });
}
function addCat(){cats.push({name:'새 분류',subs:['항목1']});renderCatEditor()}
function delCat(i){if(cats.length<=1){showToast('최소 1개 필요');return}if(!confirm(cats[i].name+' 삭제?'))return;cats.splice(i,1);renderCatEditor()}
function moveCat(i,d){const n=i+d;if(n<0||n>=cats.length)return;[cats[i],cats[n]]=[cats[n],cats[i]];renderCatEditor()}
function addSub(ci){cats[ci].subs.push('새 항목');renderCatEditor()}
function delSub(ci,si){if(cats[ci].subs.length<=1){showToast('최소 1개 필요');return}cats[ci].subs.splice(si,1);renderCatEditor()}
function moveSub(ci,si,d){const n=si+d;if(n<0||n>=cats[ci].subs.length)return;[cats[ci].subs[si],cats[ci].subs[n]]=[cats[ci].subs[n],cats[ci].subs[si]];renderCatEditor()}
function saveCats(){localStorage.setItem('LOT_CATS',JSON.stringify(cats));renderRegFields();showToast('항목 저장 완료')}
function resetCats(){if(!confirm('기본값으로 복원?'))return;cats=JSON.parse(JSON.stringify(DEFAULT_CATS));localStorage.setItem('LOT_CATS',JSON.stringify(cats));renderCatEditor();renderRegFields();showToast('기본값 복원')}

let tt;function showToast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('show'),2000)}

// 초기화
renderRegFields();
</script>
